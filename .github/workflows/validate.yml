name: Validate RGrid

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check JavaScript module syntax
        run: cp app.js /tmp/rgrid-app.mjs && node --check /tmp/rgrid-app.mjs
      - name: Check static release files and HTML references
        run: python tests/static_check.py
      - name: Check local server helper
        run: python -m py_compile serve.py
